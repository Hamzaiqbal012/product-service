name: Build and Deploy to Kubernetes

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/product-service:latest
          ${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - confirm running on master VM
      run: |
        echo "Hostname: $(hostname)"
        echo "User: $(whoami)"
        echo "HOME: $HOME"
        echo "--- Network test ---"
        curl -sk https://192.168.169.10:6443/version || echo "CURL FAILED"
        echo "--- Kubectl test ---"
        kubectl --kubeconfig /home/ubuntu/.kube/config get nodes || echo "KUBECTL FAILED"
        
    - name: Update image in deployment
      run: |
        kubectl --kubeconfig /home/ubuntu/.kube/config \
          set image deployment/product-service \
          product-service=${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }} \
          -n product-app

    - name: Wait for rollout
      run: |
        kubectl --kubeconfig /home/ubuntu/.kube/config \
          rollout status deployment/product-service -n product-app --timeout=120s

    - name: Verify deployment
      run: |
        kubectl --kubeconfig /home/ubuntu/.kube/config get pods -n product-app